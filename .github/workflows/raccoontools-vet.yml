name: "raccoontools: vet OSS Components"

on:
  pull_request:
    paths:
      - 'raccoontools/**'
  push:
    branches:
      - master
    paths:
      - 'raccoontools/**'

permissions:
  contents: read
  issues: write
  pull-requests: write
  security-events: write

jobs:
  vet:
    name: vet
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run vet
        id: vet
        uses: safedep/vet-action@v1
        with:
          policy: .github/vet/policy.yml
          path: raccoontools
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: ${{ steps.vet.outputs.report != '' }}
        with:
          sarif_file: ${{ steps.vet.outputs.report }}
          category: vet-raccoontools
